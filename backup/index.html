<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jhonathan Moreira - Web & Design</title>
    <!-- CSS Links -->
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <!-- Inicio do corpo do site -->
    <main>
      <img src="images/avatar.png" alt="Foto de perfil" id="PhotoGithub" />

      <h1 id="NameGithub">Nome Usuário</h1>

      <a href="#" target="_blank" id="userGit">
        <img src="images/github.svg" alt="Logo do Github" />
        <span id="UserNameGithub">nomedeusuario</span>
      </a>

      <p id="BioGithub">Descrição da biografia do perfil deste usuário.</p>

      <ul id="ListSocialLinks">
        <li class="instagram">
          <a href="#" target="_blank" id="LinkInstagram">
            <img src="images/instagram.svg" alt="Logotipo do Instagram" />
          </a>
        </li>
        <li class="linkedin">
          <a href="#" target="_blank" id="LinkLinkedin">
            <img src="images/linkedin.svg" alt="Logotipo do Linkedin" />
          </a>
        </li>
        <li class="twitter">
          <a href="#" target="_blank" id="LinkTwitter">
            <img src="images/twitter.svg" alt="Logotipo do Twitter" />
          </a>
        </li>
      </ul>
    </main>
    <!-- Script JS Principal -->
    <script src="js/script.js"></script>
  </body>
</html>
